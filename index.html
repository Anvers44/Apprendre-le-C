<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C Judge — Professeur de C</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #13161e;
    --card: #1a1e28;
    --border: #252a38;
    --accent: #e8c547;
    --accent2: #4ecdc4;
    --red: #ff4d4d;
    --green: #4dff91;
    --text: #e8e8f0;
    --muted: #6b7290;
    --code-bg: #0a0c11;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 24px 40px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .logo {
    width: 44px; height: 44px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 18px;
    color: #000;
    flex-shrink: 0;
  }

  header h1 {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  header h1 span { color: var(--accent); }

  .badge {
    margin-left: auto;
    background: rgba(232,197,71,0.1);
    border: 1px solid rgba(232,197,71,0.3);
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }

  /* Main layout */
  main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    height: calc(100vh - 81px);
  }

  /* Left panel */
  .panel-left {
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    padding: 28px 32px;
    gap: 16px;
    overflow-y: auto;
  }

  .section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  input[type="text"] {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    padding: 10px 16px;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--muted); }

  textarea {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: #c9d1d9;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.7;
    padding: 20px;
    resize: none;
    outline: none;
    flex: 1;
    min-height: 280px;
    transition: border-color 0.2s;
    tab-size: 4;
  }

  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }

  .btn-judge {
    background: var(--accent);
    color: #000;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    border: none;
    border-radius: 10px;
    padding: 14px 28px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    letter-spacing: 0.3px;
  }

  .btn-judge:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-judge:active { transform: translateY(0); }
  .btn-judge:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }

  .btn-judge.loading .spinner { display: block; }
  .btn-judge.loading .btn-text { display: none; }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Right panel */
  .panel-right {
    display: flex;
    flex-direction: column;
    padding: 28px 32px;
    gap: 20px;
    overflow-y: auto;
    background: var(--surface);
  }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    color: var(--muted);
    text-align: center;
  }

  .empty-icon {
    font-size: 52px;
    opacity: 0.4;
  }

  .empty-state p { font-size: 15px; max-width: 260px; line-height: 1.6; }

  /* Result cards */
  .result-hidden { display: none; }

  /* Score card */
  .score-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px 28px;
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .score-circle {
    width: 80px; height: 80px;
    border-radius: 50%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-weight: 800;
    flex-shrink: 0;
    position: relative;
  }

  .score-num {
    font-size: 28px;
    line-height: 1;
  }

  .score-denom {
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    opacity: 0.7;
  }

  .score-info h2 {
    font-size: 18px;
    font-weight: 800;
    margin-bottom: 6px;
  }

  .score-info p {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
  }

  /* Section blocks */
  .result-block {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .result-block-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }

  .result-block-header .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .result-block-body {
    padding: 18px 20px;
    font-size: 13.5px;
    line-height: 1.75;
    color: #c8cee0;
    white-space: pre-wrap;
  }

  .result-block-body code {
    font-family: 'JetBrains Mono', monospace;
    background: var(--code-bg);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 12px;
    color: var(--accent);
  }

  .result-block-body pre {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    overflow-x: auto;
    margin: 12px 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    line-height: 1.7;
    color: #c9d1d9;
  }

  /* Colors per block type */
  .block-errors .dot { background: var(--red); }
  .block-errors .result-block-header { color: var(--red); }

  .block-correction .dot { background: var(--accent2); }
  .block-correction .result-block-header { color: var(--accent2); }

  .block-tips .dot { background: var(--accent); }
  .block-tips .result-block-header { color: var(--accent); }

  .block-expert .dot { background: #a78bfa; }
  .block-expert .result-block-header { color: #a78bfa; }

  /* Student name display */
  .student-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(78,205,196,0.1);
    border: 1px solid rgba(78,205,196,0.25);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    color: var(--accent2);
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 4px;
  }

  @media (max-width: 768px) {
    main { grid-template-columns: 1fr; height: auto; }
    .panel-left, .panel-right { padding: 20px; }
    header { padding: 16px 20px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">C</div>
  <h1>C <span>Judge</span></h1>
  <div class="badge">PROF MODE</div>
</header>

<main>
  <!-- LEFT: Input -->
  <div class="panel-left">
    <div class="input-group">
      <div class="section-label">Nom de l'étudiant</div>
      <input type="text" id="studentName" placeholder="Ex: Ahmed, Mohamed..." />
    </div>

    <div class="input-group">
      <div class="section-label">Énoncé / Consigne de l'exercice</div>
      <input type="text" id="exerciseTitle" placeholder="Ex: Écrire une fonction qui calcule la factorielle..." />
    </div>

    <div class="section-label">Code C à corriger</div>
    <textarea id="codeInput" placeholder="#include <stdio.h>

int main() {
    // Collez votre code C ici...
    return 0;
}"></textarea>

    <button class="btn-judge" id="judgeBtn" onclick="judgeCode()">
      <div class="spinner"></div>
      <span class="btn-text">⚖️ Corriger le code</span>
    </button>
  </div>

  <!-- RIGHT: Result -->
  <div class="panel-right" id="resultPanel">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">📋</div>
      <p>Collez votre code C et cliquez sur <strong>Corriger</strong> pour recevoir une analyse complète.</p>
    </div>

    <div class="result-hidden" id="resultContent">
      <div id="studentTagContainer"></div>
      <div class="score-card" id="scoreCard">
        <div class="score-circle" id="scoreCircle">
          <div class="score-num" id="scoreNum">–</div>
          <div class="score-denom">/10</div>
        </div>
        <div class="score-info">
          <h2 id="scoreTitle">–</h2>
          <p id="scoreVerdict">–</p>
        </div>
      </div>

      <div class="result-block block-errors" id="errorsBlock">
        <div class="result-block-header"><div class="dot"></div>Erreurs & Problèmes détectés</div>
        <div class="result-block-body" id="errorsBody"></div>
      </div>

      <div class="result-block block-correction" id="correctionBlock">
        <div class="result-block-header"><div class="dot"></div>Code corrigé</div>
        <div class="result-block-body" id="correctionBody"></div>
      </div>

      <div class="result-block block-tips" id="tipsBlock">
        <div class="result-block-header"><div class="dot"></div>Conseils pour progresser</div>
        <div class="result-block-body" id="tipsBody"></div>
      </div>

      <div class="result-block block-expert" id="expertBlock">
        <div class="result-block-header"><div class="dot"></div>Comment un expert C l'aurait écrit</div>
        <div class="result-block-body" id="expertBody"></div>
      </div>
    </div>
  </div>
</main>

<script>
async function judgeCode() {
  const code = document.getElementById('codeInput').value.trim();
  const name = document.getElementById('studentName').value.trim();
  const exercise = document.getElementById('exerciseTitle').value.trim();

  if (!code) { alert("Veuillez entrer du code C à corriger."); return; }

  const btn = document.getElementById('judgeBtn');
  btn.disabled = true;
  btn.classList.add('loading');

  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('resultContent').className = 'result-hidden';

  const systemPrompt = `Tu es un professeur expert en langage C, rigoureux mais bienveillant. Tu analyses du code C soumis par des étudiants débutants ou intermédiaires.

Tu dois répondre UNIQUEMENT en JSON valide, sans balises markdown, sans texte avant ou après le JSON. Structure exacte:

{
  "score": <nombre entier de 0 à 10>,
  "scoreTitle": <titre court type mention: "Insuffisant", "Passable", "Bien", "Très Bien", "Excellent">,
  "verdict": <phrase courte de verdict global>,
  "errors": <texte markdown simple listant les erreurs/problèmes détectés, utilise des tirets - pour les listes>,
  "correctedCode": <le code C corrigé complet, sans backticks>,
  "tips": <conseils concrets pour progresser, listés avec tirets ->,
  "expertVersion": <comment un expert C expérimenté aurait écrit ce code (version optimale avec explication), le code sans backticks>
}

Sois pédagogue, précis et encourageant. Adapte le niveau à des apprenants en C.`;

  const userPrompt = `${name ? `Étudiant: ${name}\n` : ''}${exercise ? `Consigne de l'exercice: ${exercise}\n` : ''}
Code C à analyser:
${code}`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 4000,
        system: systemPrompt,
        messages: [{ role: "user", content: userPrompt }]
      })
    });

    const data = await response.json();
    const rawText = data.content.map(i => i.text || "").join("");
    const clean = rawText.replace(/```json|```/g, "").trim();
    const result = JSON.parse(clean);

    renderResult(result, name);
  } catch(err) {
    alert("Erreur lors de l'analyse. Réessayez.");
    console.error(err);
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
  }
}

function renderResult(r, name) {
  // Student tag
  const tagContainer = document.getElementById('studentTagContainer');
  tagContainer.innerHTML = name
    ? `<div class="student-tag">👤 ${escHtml(name)}</div>`
    : '';

  // Score
  const score = r.score || 0;
  const circle = document.getElementById('scoreCircle');
  const colors = score >= 8 ? ['#4dff91','rgba(77,255,145,0.12)']
                : score >= 6 ? ['#e8c547','rgba(232,197,71,0.12)']
                : score >= 4 ? ['#ff9f4d','rgba(255,159,77,0.12)']
                :              ['#ff4d4d','rgba(255,77,77,0.12)'];

  circle.style.background = colors[1];
  circle.style.border = `2px solid ${colors[0]}`;
  document.getElementById('scoreNum').style.color = colors[0];
  document.getElementById('scoreNum').textContent = score;
  document.getElementById('scoreTitle').textContent = r.scoreTitle || '';
  document.getElementById('scoreVerdict').textContent = r.verdict || '';

  // Errors
  document.getElementById('errorsBody').innerHTML = markdownToHtml(r.errors || 'Aucune erreur majeure détectée.');

  // Corrected code
  document.getElementById('correctionBody').innerHTML =
    `<pre>${escHtml(r.correctedCode || '')}</pre>`;

  // Tips
  document.getElementById('tipsBody').innerHTML = markdownToHtml(r.tips || '');

  // Expert
  const expertLines = (r.expertVersion || '').split(/```c?|```/);
  let expertHtml = '';
  expertLines.forEach((chunk, i) => {
    if (i % 2 === 0) expertHtml += markdownToHtml(chunk);
    else expertHtml += `<pre>${escHtml(chunk.trim())}</pre>`;
  });
  document.getElementById('expertBody').innerHTML = expertHtml || markdownToHtml(r.expertVersion || '');

  document.getElementById('resultContent').className = '';
  document.getElementById('resultPanel').scrollTop = 0;
}

function markdownToHtml(text) {
  return escHtml(text)
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/^- (.+)$/gm, '• $1')
    .replace(/\n/g, '<br>');
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Tab support in textarea
document.getElementById('codeInput').addEventListener('keydown', function(e) {
  if (e.key === 'Tab') {
    e.preventDefault();
    const s = this.selectionStart, end = this.selectionEnd;
    this.value = this.value.substring(0,s) + '    ' + this.value.substring(end);
    this.selectionStart = this.selectionEnd = s + 4;
  }
});
</script>
</body>
</html>
